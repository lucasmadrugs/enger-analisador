<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGER - Analisador de Fatura</title>
    
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar o JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts para os gráficos -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <style>
        body { background-color: #060e1f; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b1325; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell } = window.Recharts;

        // Base de dados de Concessionárias
        const CONCESSIONARIAS_DATA = {
            'Enel SP': { tarifa_demanda: 25.40, tarifa_energia: 0.65, tarifa_ponta: 1.15 },
            'CPFL': { tarifa_demanda: 28.10, tarifa_energia: 0.62, tarifa_ponta: 1.18 },
            'Cemig': { tarifa_demanda: 30.50, tarifa_energia: 0.68, tarifa_ponta: 1.25 },
            'Copel': { tarifa_demanda: 22.80, tarifa_energia: 0.59, tarifa_ponta: 1.05 },
            'Neoenergia': { tarifa_demanda: 32.10, tarifa_energia: 0.75, tarifa_ponta: 1.35 },
            'Equatorial': { tarifa_demanda: 35.00, tarifa_energia: 0.80, tarifa_ponta: 1.45 },
            'Light': { tarifa_demanda: 29.50, tarifa_energia: 0.70, tarifa_ponta: 1.28 },
            'Energisa': { tarifa_demanda: 31.00, tarifa_energia: 0.72, tarifa_ponta: 1.30 },
            'Celesc': { tarifa_demanda: 21.50, tarifa_energia: 0.55, tarifa_ponta: 1.00 },
            'Outra': { tarifa_demanda: 28.00, tarifa_energia: 0.65, tarifa_ponta: 1.20 }
        };

        // Ícones SVG Inline (Substituindo Lucide para funcionar no HTML único)
        const IconDollar = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>;
        const IconTrendingDown = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>;
        const IconZap = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const IconWand = ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"></path><path d="m14 7 3 3"></path><path d="M5 6v4"></path><path d="M19 14v4"></path><path d="M10 2v2"></path><path d="M7 8H3"></path><path d="M21 16h-4"></path><path d="M11 3H9"></path></svg>;

        const AnalyzerApp = () => {
            // Estados de Configuração Base
            const [grupoTarifario, setGrupoTarifario] = useState('A');
            const [concessionaria, setConcessionaria] = useState('Cemig');
            const [classeConsumo, setClasseConsumo] = useState('Comercial');
            const [modalidadeTarifaria, setModalidadeTarifaria] = useState('Verde');

            // Estados de Tarifas (Auto-preenchidas)
            const [tarifaDemanda, setTarifaDemanda] = useState(CONCESSIONARIAS_DATA['Cemig'].tarifa_demanda);
            const [tarifaEnergia, setTarifaEnergia] = useState(CONCESSIONARIAS_DATA['Cemig'].tarifa_energia);
            const [tarifaPonta, setTarifaPonta] = useState(CONCESSIONARIAS_DATA['Cemig'].tarifa_ponta);

            // Estados de Consumo e Demanda
            const [consumoAtivo, setConsumoAtivo] = useState(1500);
            const [consumoPonta, setConsumoPonta] = useState(0);
            const [demandaContratada, setDemandaContratada] = useState(150);
            const [demandaMedida, setDemandaMedida] = useState(145);

            // Estados de Adicionais e Penalidades
            const [custoReativo, setCustoReativo] = useState(0);
            const [custoAtraso, setCustoAtraso] = useState(0);
            const [custoBandeiras, setCustoBandeiras] = useState(0);
            const [custoImpostos, setCustoImpostos] = useState(0);
            const [custoIluminacao, setCustoIluminacao] = useState(45);

            const [analysis, setAnalysis] = useState(null);

            // Atualiza as tarifas base quando a concessionária muda
            useEffect(() => {
                const tarifas = CONCESSIONARIAS_DATA[concessionaria];
                setTarifaDemanda(tarifas.tarifa_demanda);
                setTarifaEnergia(tarifas.tarifa_energia);
                setTarifaPonta(tarifas.tarifa_ponta);
            }, [concessionaria]);

            const runAnalysis = () => {
                let alertas = [];
                let custoEnergia = 0;
                let custoEnergiaPonta = 0;
                let custoDemandaBase = 0;
                let multaUltrapassagem = 0;
                let custoOciosidade = 0;
                let percentualOcioso = 0;

                // Avisos de Subgrupo
                if (classeConsumo === 'Rural') {
                    alertas.push({ type: 'info', msg: 'Classe Rural: Verifique se o cliente está recebendo o subsídio tarifário (desconto rural).' });
                }

                // Cálculos Grupo A
                if (grupoTarifario === 'A') {
                    custoEnergia = consumoAtivo * tarifaEnergia;
                    custoEnergiaPonta = consumoPonta * tarifaPonta;

                    if (demandaMedida > (demandaContratada * 1.05)) {
                        custoDemandaBase = demandaMedida * tarifaDemanda;
                        let ultrapassagem = demandaMedida - (demandaContratada * 1.05);
                        multaUltrapassagem = ultrapassagem * (tarifaDemanda * 2);
                        alertas.push({ type: 'error', msg: 'Multa por Ultrapassagem de Demanda: O cliente excedeu a tolerância de 5%.' });
                    } else {
                        custoDemandaBase = demandaContratada * tarifaDemanda;
                        if (demandaMedida < demandaContratada) {
                            let demandaNaoUtilizada = demandaContratada - demandaMedida;
                            percentualOcioso = (demandaNaoUtilizada / demandaContratada) * 100;
                            if (percentualOcioso > 15) {
                                custoOciosidade = demandaNaoUtilizada * tarifaDemanda;
                                alertas.push({ type: 'warning', msg: `Demanda Ociosa: Cliente pagou por ${percentualOcioso.toFixed(1)}% de demanda que não usou.` });
                            }
                        }
                    }

                    if (custoReativo > 0) alertas.push({ type: 'warning', msg: 'Cobrança de Energia Reativa: Necessário estudo para banco de capacitores.' });
                    if (consumoPonta > (consumoAtivo * 0.15)) alertas.push({ type: 'info', msg: 'Consumo elevado na Ponta: Avaliar deslocamento de carga.' });

                } else {
                    // Cálculos Grupo B
                    custoEnergia = consumoAtivo * tarifaEnergia;
                    if (consumoAtivo > 3000 && classeConsumo !== 'Residencial') {
                        alertas.push({ type: 'info', msg: 'Consumo muito alto (> 3000 kWh). Pode ser vantajoso migrar para o Grupo A ou Mercado Livre.' });
                    }
                }

                if (custoAtraso > 0) alertas.push({ type: 'error', msg: 'Juros por Atraso: Custo 100% evitável que afeta o fluxo de caixa.' });

                // Resultados Finais
                let custoTotal = 0;
                let potencialEconomia = 0;
                let economiaSolar = 0;
                let economiaGDCompartilhada = 0;

                if (grupoTarifario === 'A') {
                    custoTotal = custoEnergia + custoEnergiaPonta + custoDemandaBase + multaUltrapassagem + custoReativo + Number(custoBandeiras) + Number(custoImpostos) + Number(custoAtraso);
                    potencialEconomia = multaUltrapassagem + custoReativo + custoOciosidade + Number(custoAtraso);
                    economiaSolar = (custoEnergia + custoEnergiaPonta) * 0.85;
                    economiaGDCompartilhada = (custoEnergia + custoEnergiaPonta) * 0.15;
                } else {
                    custoTotal = custoEnergia + Number(custoIluminacao) + Number(custoBandeiras) + Number(custoImpostos) + Number(custoAtraso) + custoReativo;
                    potencialEconomia = Number(custoAtraso) + custoReativo;
                    economiaSolar = custoEnergia * 0.90;
                    economiaGDCompartilhada = custoEnergia * 0.15;
                }

                setAnalysis({
                    custoTotal, custoEnergia, custoEnergiaPonta, custoDemandaBase,
                    multaUltrapassagem, custoReativo, custoIluminacao, custoBandeiras, custoImpostos, custoAtraso,
                    custoOciosidade, percentualOcioso, potencialEconomia, economiaSolar, economiaGDCompartilhada, alertas
                });
            };

            useEffect(() => { runAnalysis(); }, [
                grupoTarifario, concessionaria, classeConsumo, modalidadeTarifaria,
                consumoAtivo, consumoPonta, demandaContratada, demandaMedida,
                custoReativo, custoAtraso, custoBandeiras, custoImpostos, custoIluminacao,
                tarifaDemanda, tarifaEnergia, tarifaPonta
            ]);

            const formatCurrency = (value) => {
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);
            };

            return (
                <div className="min-h-screen p-4 lg:p-8 font-sans">
                    <div className="max-w-7xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-[#0b1325] p-6 rounded-2xl border border-slate-800 shadow-lg">
                            <div>
                                <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 tracking-tight">
                                    ENGER
                                </h1>
                                <p className="text-slate-400 mt-1 font-medium">Analisador de Fatura e Viabilidade Tarifária v3.0</p>
                            </div>
                            
                            <div className="mt-4 md:mt-0 flex bg-slate-900 p-1 rounded-lg border border-slate-800">
                                <button onClick={() => setGrupoTarifario('A')} className={`px-6 py-2 rounded-md font-bold text-sm transition-all ${grupoTarifario === 'A' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}>
                                    Grupo A (Alta Tensão)
                                </button>
                                <button onClick={() => setGrupoTarifario('B')} className={`px-6 py-2 rounded-md font-bold text-sm transition-all ${grupoTarifario === 'B' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}>
                                    Grupo B (Baixa Tensão)
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            
                            {}
                            {/* Left Column - Inputs */}
                            <div className="lg:col-span-4 bg-[#0b1325] p-6 rounded-2xl border border-slate-800 shadow-lg space-y-6 h-fit">
                                
                                {/* Identificação */}
                                <div>
                                    <h3 className="text-sm font-bold text-blue-400 uppercase tracking-wider mb-4 border-b border-slate-800 pb-2">Identificação</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-medium text-slate-400 mb-1">Concessionária</label>
                                            <select value={concessionaria} onChange={(e) => setConcessionaria(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                                                {Object.keys(CONCESSIONARIAS_DATA).map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-400 mb-1">Classe de Consumo</label>
                                            <select value={classeConsumo} onChange={(e) => setClasseConsumo(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                                                <option value="Comercial">Comercial</option>
                                                <option value="Industrial">Industrial</option>
                                                <option value="Residencial">Residencial</option>
                                                <option value="Rural">Rural (Agro)</option>
                                                <option value="Poder Público">Poder Público</option>
                                            </select>
                                        </div>
                                        {grupoTarifario === 'A' && (
                                            <div>
                                                <label className="block text-xs font-medium text-slate-400 mb-1">Modalidade</label>
                                                <select value={modalidadeTarifaria} onChange={(e) => setModalidadeTarifaria(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                                                    <option value="Verde">Verde (Convencional)</option>
                                                    <option value="Azul">Azul</option>
                                                </select>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Dados Técnicos */}
                                <div>
                                    <h3 className="text-sm font-bold text-blue-400 uppercase tracking-wider mb-4 border-b border-slate-800 pb-2">Dados de Consumo</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-xs font-medium text-slate-400 mb-1">Consumo Ativo (kWh)</label>
                                            <input type="number" value={consumoAtivo} onChange={(e) => setConsumoAtivo(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white" />
                                        </div>
                                        {grupoTarifario === 'A' && (
                                            <div>
                                                <label className="block text-xs font-medium text-slate-400 mb-1">Consumo na Ponta (kWh)</label>
                                                <input type="number" value={consumoPonta} onChange={(e) => setConsumoPonta(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white" />
                                            </div>
                                        )}
                                        {grupoTarifario === 'A' && (
                                            <div className="grid grid-cols-2 gap-3 pt-2">
                                                <div>
                                                    <label className="block text-xs font-medium text-slate-400 mb-1">Demanda Contratada</label>
                                                    <input type="number" value={demandaContratada} onChange={(e) => setDemandaContratada(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white" />
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-medium text-slate-400 mb-1">Demanda Medida</label>
                                                    <input type="number" value={demandaMedida} onChange={(e) => setDemandaMedida(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white" />
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Adicionais */}
                                <div>
                                    <h3 className="text-sm font-bold text-blue-400 uppercase tracking-wider mb-4 border-b border-slate-800 pb-2">Adicionais e Multas</h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        {grupoTarifario === 'A' ? (
                                            <div className="col-span-2">
                                                <label className="block text-xs font-medium text-slate-400 mb-1">Multa Reativo (R$)</label>
                                                <input type="number" value={custoReativo} onChange={(e) => setCustoReativo(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white" />
                                            </div>
                                        ) : (
                                            <div className="col-span-2">
                                                <label className="block text-xs font-medium text-slate-400 mb-1">Iluminação (CIP) (R$)</label>
                                                <input type="number" value={custoIluminacao} onChange={(e) => setCustoIluminacao(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white" />
                                            </div>
                                        )}
                                        <div>
                                            <label className="block text-xs font-medium text-slate-400 mb-1">Bandeiras (R$)</label>
                                            <input type="number" value={custoBandeiras} onChange={(e) => setCustoBandeiras(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-medium text-slate-400 mb-1">Impostos (R$)</label>
                                            <input type="number" value={custoImpostos} onChange={(e) => setCustoImpostos(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white" />
                                        </div>
                                        <div className="col-span-2">
                                            <label className="block text-xs font-medium text-slate-400 mb-1">Multas por Atraso (R$)</label>
                                            <input type="number" value={custoAtraso} onChange={(e) => setCustoAtraso(Number(e.target.value))} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-red-500" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {}
                            {/* Right Column - Results Dashboard */}
                            <div className="lg:col-span-8 space-y-6">
                                {analysis && (
                                    <>
                                        {/* Highlight Cards */}
                                        <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
                                            <div className="bg-[#0b1325] p-5 rounded-2xl shadow-xl border border-slate-800 flex flex-col justify-center relative overflow-hidden group">
                                                <h3 className="text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-2 flex items-center gap-1.5"><IconDollar/> Fatura Estimada</h3>
                                                <p className="text-xl lg:text-2xl font-black text-white">{formatCurrency(analysis.custoTotal)}</p>
                                                <p className="text-[10px] text-slate-500 mt-2">Soma de todos os componentes.</p>
                                            </div>
                                            
                                            <div className="p-5 rounded-2xl shadow-xl border flex flex-col justify-center relative overflow-hidden bg-gradient-to-br from-[#1a140f] to-[#0b1325] border-yellow-900/50">
                                                <h3 className="text-[10px] uppercase tracking-wider font-bold mb-2 flex items-center gap-1.5 text-yellow-400"><IconTrendingDown className="w-3.5 h-3.5"/> Desperdício Atual</h3>
                                                <p className="text-xl lg:text-2xl font-black text-white">{formatCurrency(analysis.potencialEconomia)}</p>
                                                <p className="text-[10px] mt-2 text-yellow-500/70">{grupoTarifario === 'A' ? 'Multas, reativo e demanda.' : 'Juros e multas evitáveis.'}</p>
                                            </div>

                                            <div className="p-5 rounded-2xl shadow-xl border flex flex-col justify-center relative overflow-hidden bg-gradient-to-br from-[#0f1a14] to-[#0b1325] border-emerald-900/50">
                                                <h3 className="text-[10px] uppercase tracking-wider font-bold mb-2 flex items-center gap-1.5 text-emerald-400"><IconZap className="w-3.5 h-3.5"/> Usina Própria</h3>
                                                <p className="text-xl lg:text-2xl font-black text-white">{formatCurrency(analysis.economiaSolar)}</p>
                                                <p className="text-[10px] mt-2 text-emerald-500/70">Economia com placas solares.</p>
                                            </div>

                                            <div className="p-5 rounded-2xl shadow-xl border flex flex-col justify-center relative overflow-hidden bg-gradient-to-br from-[#0f172a] to-[#0b1325] border-cyan-900/50">
                                                <h3 className="text-[10px] uppercase tracking-wider font-bold mb-2 flex items-center gap-1.5 text-cyan-400"><IconWand className="w-3.5 h-3.5"/> GD Compartilhada</h3>
                                                <p className="text-xl lg:text-2xl font-black text-white">{formatCurrency(analysis.economiaGDCompartilhada)}</p>
                                                <p className="text-[10px] mt-2 text-cyan-500/70">Desconto s/ investimento.</p>
                                            </div>
                                        </div>

                                        {}
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                            {/* Gráfico */}
                                            <div className="bg-[#0b1325] p-6 rounded-2xl border border-slate-800 shadow-lg">
                                                <h3 className="text-sm font-bold text-slate-300 uppercase tracking-wider mb-6">Composição da Fatura</h3>
                                                <div className="h-64 w-full">
                                                    <ResponsiveContainer width="100%" height="100%">
                                                        <BarChart layout="vertical" data={[
                                                            ...(analysis.custoEnergia > 0 ? [{ name: 'Consumo Ativo', valor: analysis.custoEnergia, color: '#3b82f6' }] : []),
                                                            ...(analysis.custoEnergiaPonta > 0 ? [{ name: 'Consumo Ponta', valor: analysis.custoEnergiaPonta, color: '#f97316' }] : []),
                                                            ...(analysis.custoDemandaBase > 0 ? [{ name: 'Demanda', valor: analysis.custoDemandaBase, color: '#10b981' }] : []),
                                                            ...(analysis.multaUltrapassagem > 0 ? [{ name: 'Multa Demanda', valor: analysis.multaUltrapassagem, color: '#ef4444' }] : []),
                                                            ...(analysis.custoReativo > 0 ? [{ name: 'Reativo Excedente', valor: analysis.custoReativo, color: '#eab308' }] : []),
                                                            ...(analysis.custoBandeiras > 0 ? [{ name: 'Bandeiras', valor: analysis.custoBandeiras, color: '#f59e0b' }] : []),
                                                            ...(analysis.custoImpostos > 0 ? [{ name: 'Impostos', valor: analysis.custoImpostos, color: '#8b5cf6' }] : []),
                                                            ...(analysis.custoAtraso > 0 ? [{ name: 'Atraso/Juros', valor: analysis.custoAtraso, color: '#ec4899' }] : []),
                                                            ...(analysis.custoIluminacao > 0 && grupoTarifario === 'B' ? [{ name: 'Iluminação', valor: analysis.custoIluminacao, color: '#64748b' }] : [])
                                                        ].sort((a,b) => a.valor - b.valor)} margin={{ top: 0, right: 30, left: 40, bottom: 0 }}>
                                                            <XAxis type="number" stroke="#475569" tickFormatter={(v) => `R$${v}`} />
                                                            <YAxis dataKey="name" type="category" stroke="#94a3b8" width={100} tick={{fontSize: 10}} />
                                                            <Tooltip formatter={(value) => formatCurrency(value)} contentStyle={{backgroundColor: '#0f172a', border: '1px solid #1e293b'}} />
                                                            <Bar dataKey="valor" radius={[0, 4, 4, 0]}>
                                                                {({ data }) => data.map((entry, index) => (
                                                                    <Cell key={`cell-${index}`} fill={entry.color} />
                                                                ))}
                                                            </Bar>
                                                        </BarChart>
                                                    </ResponsiveContainer>
                                                </div>
                                            </div>

                                            {/* Laudo e Alertas */}
                                            <div className="bg-[#0b1325] p-6 rounded-2xl border border-slate-800 shadow-lg flex flex-col">
                                                <h3 className="text-sm font-bold text-slate-300 uppercase tracking-wider mb-6">Laudo Técnico</h3>
                                                <div className="space-y-3 flex-1 overflow-y-auto pr-2">
                                                    {analysis.alertas.length === 0 ? (
                                                        <div className="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-lg text-emerald-400 text-sm">
                                                            Nenhuma anomalia grave detectada. Foco na venda de soluções de economia direta (GD).
                                                        </div>
                                                    ) : (
                                                        analysis.alertas.map((alerta, idx) => (
                                                            <div key={idx} className={`p-4 rounded-lg text-sm border ${
                                                                alerta.type === 'error' ? 'bg-red-500/10 border-red-500/20 text-red-400' :
                                                                alerta.type === 'warning' ? 'bg-yellow-500/10 border-yellow-500/20 text-yellow-400' :
                                                                'bg-blue-500/10 border-blue-500/20 text-blue-400'
                                                            }`}>
                                                                {alerta.msg}
                                                            </div>
                                                        ))
                                                    )}

                                                    {grupoTarifario === 'A' && analysis.percentualOcioso > 15 && (
                                                        <div className="mt-6 bg-yellow-500/10 border-l-4 border-yellow-500 p-4 rounded-r-lg">
                                                            <p className="text-yellow-500 font-bold text-sm mb-1">Demanda Ociosa Crítica</p>
                                                            <p className="text-slate-400 text-xs mb-3">Utilizado: {demandaMedida}kW / Contratado: {demandaContratada}kW</p>
                                                            <div className="w-full bg-slate-800 rounded-full h-2 mb-2 overflow-hidden flex">
                                                                <div className="bg-emerald-500 h-2" style={{width: `${(demandaMedida/demandaContratada)*100}%`}}></div>
                                                                <div className="bg-yellow-500 h-2" style={{width: `${analysis.percentualOcioso}%`}}></div>
                                                            </div>
                                                            <p className="text-xs text-yellow-500/80">Prejuízo anual estimado: <strong>{formatCurrency(analysis.custoOciosidade * 12)}</strong></p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AnalyzerApp />);
    </script>
</body>
</html>
